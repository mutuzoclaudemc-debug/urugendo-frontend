services:
  - type: web
    name: urugendo-frontend
    env: php
    buildCommand: composer install --no-dev --optimize-autoloader && npm ci && npm run build && php artisan config:cache && php artisan route:cache && php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    plan: free
    envVars:
      - key: APP_NAME
        value: Urugendo
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: false
        sync: false        # paste the base64 key from your .env into the Render dashboard
      - key: APP_URL
        sync: false        # will be your Render URL, e.g. https://urugendo-frontend.onrender.com
      - key: API_BASE_URL
        value: https://urugendo-backend.onrender.com/api
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: LOG_CHANNEL
        value: stderr
